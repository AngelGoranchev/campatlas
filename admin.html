<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampAtlas | Администрация</title>
  </head>
  <body>
    <main class="container py-5 app-page">
      <section class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
        <div>
          <h1 class="mb-2">Административен панел</h1>
          <p class="text-muted mb-0">Преглеждайте чакащи къмпинги и управлявайте техния статус.</p>
        </div>

        <div class="d-flex flex-wrap gap-2">
          <a href="/campsites.html" class="btn btn-outline-success">Към къмпингите</a>
          <a href="/index.html" class="btn btn-outline-secondary">Към началото</a>
          <button type="button" class="btn btn-danger" data-auth-logout>
            <i class="bi bi-box-arrow-right me-1"></i>Изход
          </button>
        </div>
      </section>

      <div id="adminLoading" class="alert alert-info" role="status">
        <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
        Проверка на достъп и зареждане на чакащи къмпинги...
      </div>

      <div id="adminAccessDenied" class="alert alert-warning d-none" role="alert"></div>
      <div id="adminError" class="alert alert-danger d-none" role="alert"></div>
      <div id="adminEmpty" class="alert alert-secondary d-none" role="status"></div>

      <section id="adminContent" class="card border-0 shadow-sm d-none" aria-live="polite">
        <div class="card-body p-4">
          <h2 class="h5 mb-3">Чакащи къмпинги</h2>

          <div class="table-responsive">
            <table class="table align-middle">
              <thead>
                <tr>
                  <th scope="col">Заглавие</th>
                  <th scope="col">Локация</th>
                  <th scope="col">Създаден на</th>
                  <th scope="col">Цена</th>
                  <th scope="col" class="text-end">Действия</th>
                </tr>
              </thead>
              <tbody id="pendingCampsitesBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/pages/admin.page.js"></script>
  </body>
</html>
