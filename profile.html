<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampAtlas | Моят профил</title>
  </head>
  <body>
    <main class="container py-5 app-page">
      <div class="row g-4 justify-content-center">
        <div class="col-12 col-lg-8">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4 p-md-5">
              <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
                <div>
                  <h1 class="h3 mb-1">Моят профил</h1>
                  <p class="text-muted mb-0">Управлявайте основните си данни.</p>
                </div>
                <button type="button" class="btn btn-outline-danger btn-sm" data-auth-logout>
                  <i class="bi bi-box-arrow-right me-1"></i>Изход
                </button>
              </div>

              <div id="profileMessage" class="alert d-none" role="alert" aria-live="polite"></div>

              <div class="mb-4">
                <label class="form-label text-muted mb-1">Имейл</label>
                <p id="profileEmail" class="fs-6 fw-semibold mb-0">-</p>
              </div>

              <form id="profileForm" class="needs-validation" method="post" novalidate>
                <div class="mb-3">
                  <label for="profileFullName" class="form-label">Име и фамилия</label>
                  <input
                    id="profileFullName"
                    name="full_name"
                    type="text"
                    class="form-control"
                    autocomplete="name"
                    minlength="2"
                    required
                  />
                  <div class="invalid-feedback">Моля, въведете име и фамилия.</div>
                </div>

                <div class="d-flex gap-2">
                  <button type="submit" class="btn btn-success">
                    <i class="bi bi-save me-1"></i>Запази промените
                  </button>
                  <a href="/index.html" class="btn btn-outline-success">Към началото</a>
                </div>
              </form>
            </div>
          </div>

          <div class="card border-0 shadow-sm mt-4">
            <div class="card-body p-4 p-md-5">
              <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-3">
                <div>
                  <h2 class="h4 mb-1">Моите къмпинги</h2>
                  <p class="text-muted mb-0">Управлявайте добавените от вас места за къмпинг.</p>
                </div>

                <a href="/create-campsite.html" class="btn btn-success btn-sm">
                  <i class="bi bi-plus-circle me-1"></i>Добави къмпинг
                </a>
              </div>

              <div id="myCampsitesLoading" class="alert alert-info" role="status">
                <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
                Зареждане на вашите къмпинги...
              </div>

              <div id="myCampsitesError" class="alert alert-danger d-none" role="alert"></div>

              <div id="myCampsitesEmpty" class="alert alert-secondary d-none" role="status">
                Все още нямате добавени къмпинги.
              </div>

              <div id="myCampsitesList" class="d-grid gap-3 d-none" aria-live="polite"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/src/pages/profile.page.js"></script>
  </body>
</html>
