<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampAtlas | Вход</title>
  </head>
  <body>
    <main class="container py-5 app-page">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4 p-md-5">
              <h1 class="h3 mb-3">Вход</h1>
              <p class="text-muted mb-4">Влез в своя профил, за да управляваш къмпингите си.</p>

              <div id="loginMessage" class="alert d-none" role="alert" aria-live="polite"></div>

              <form id="loginForm" class="needs-validation" novalidate>
                <div class="mb-3">
                  <label for="loginEmail" class="form-label">Имейл</label>
                  <input
                    id="loginEmail"
                    name="email"
                    type="email"
                    class="form-control"
                    autocomplete="email"
                    required
                  />
                  <div class="invalid-feedback">Моля, въведете валиден имейл.</div>
                </div>

                <div class="mb-3">
                  <label for="loginPassword" class="form-label">Парола</label>
                  <input
                    id="loginPassword"
                    name="password"
                    type="password"
                    class="form-control"
                    autocomplete="current-password"
                    minlength="6"
                    required
                  />
                  <div class="invalid-feedback">Паролата трябва да бъде поне 6 символа.</div>
                </div>

                <button type="submit" class="btn btn-success w-100">
                  <i class="bi bi-box-arrow-in-right me-2"></i>Вход
                </button>
              </form>

              <div class="d-flex justify-content-between align-items-center mt-4 gap-2">
                <a href="/register.html" class="btn btn-outline-success btn-sm">Нямате профил?</a>
                <a href="/index.html" class="btn btn-link btn-sm text-success px-0">Към началото</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/src/pages/login.page.js"></script>
  </body>
</html>
