<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampAtlas | Детайли за къмпинг</title>
  </head>
  <body>
    <main class="container py-5 app-page">
      <section class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
        <div>
          <span class="section-eyebrow mb-2">CampAtlas Listing</span>
          <h1 class="mb-2">Детайли за къмпинг</h1>
          <p class="app-muted mb-0">Пълна информация, снимки, любими, локация и отзиви от посетители.</p>
        </div>

        <div class="d-flex flex-wrap gap-2">
          <a href="/campsites.html" class="btn btn-outline-success">Към всички къмпинги</a>
          <a href="/index.html" class="btn btn-outline-secondary">Към началото</a>
        </div>
      </section>

      <div id="campsiteDetailsLoading" class="alert alert-info" role="status">
        <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
        Зареждане на детайли за къмпинга...
      </div>

      <div id="campsiteDetailsError" class="alert alert-danger d-none" role="alert"></div>

      <section id="campsiteDetailsContent" class="d-none" aria-live="polite">
        <article class="details-hero details-section-card p-4 mb-4">
          <div class="d-flex flex-wrap justify-content-between align-items-start gap-3">
            <div>
              <p class="details-meta mb-2">
                <i class="bi bi-geo-alt-fill"></i>
                <span id="campsiteLocation"></span>
              </p>
              <h2 id="campsiteTitle" class="h3 mb-0"></h2>
            </div>

            <div class="d-flex flex-column align-items-start align-items-md-end gap-2">
              <p id="campsitePrice" class="details-price mb-0"></p>
              <button id="favoriteButton" type="button" class="btn btn-outline-danger d-none"></button>
            </div>
          </div>
        </article>

        <section class="details-section-card p-4 mb-4">
          <div class="d-flex align-items-center gap-2 mb-3">
            <span class="icon-badge"><i class="bi bi-camera"></i></span>
            <h3 class="h5 mb-0">Галерия</h3>
          </div>
          <div id="campsiteGallery" class="row g-3"></div>
        </section>

        <div class="row g-4 mb-4">
          <div class="col-12 col-lg-7">
            <section class="details-section-card p-4 h-100">
              <div class="d-flex align-items-center gap-2 mb-3">
                <span class="icon-badge"><i class="bi bi-journal-text"></i></span>
                <h3 class="h5 mb-0">Описание</h3>
              </div>
              <p id="campsiteDescription" class="mb-0"></p>
            </section>
          </div>

          <div class="col-12 col-lg-5">
            <section class="details-section-card p-4 h-100">
              <div class="d-flex align-items-center gap-2 mb-3">
                <span class="icon-badge"><i class="bi bi-stars"></i></span>
                <h3 class="h5 mb-0">Удобства</h3>
              </div>
              <div id="campsiteAmenities" class="details-amenities d-flex flex-wrap gap-2"></div>
            </section>
          </div>
        </div>

        <section class="details-section-card p-4 mb-4">
          <div class="d-flex align-items-center gap-2 mb-3">
            <span class="icon-badge"><i class="bi bi-clipboard-check"></i></span>
            <h3 class="h5 mb-0">Бележки</h3>
          </div>

          <div class="row g-3">
            <div class="col-12 col-lg-6">
              <section id="positiveNotesSection" class="details-note-card h-100 d-none">
                <h4 class="h6 text-success mb-2">Положителни бележки</h4>
                <p id="campsitePositiveNotes" class="mb-0"></p>
              </section>
            </div>

            <div class="col-12 col-lg-6">
              <section id="negativeNotesSection" class="details-note-card h-100 d-none">
                <h4 class="h6 text-danger mb-2">Отрицателни бележки</h4>
                <p id="campsiteNegativeNotes" class="mb-0"></p>
              </section>
            </div>
          </div>
        </section>

        <section id="campsiteDetailsMapSection" class="details-section-card p-4 mb-4 d-none">
          <div class="d-flex align-items-center gap-2 mb-3">
            <span class="icon-badge"><i class="bi bi-map"></i></span>
            <h3 class="h5 mb-0">Локация на картата</h3>
          </div>
          <p id="campsiteDetailsMapMessage" class="text-muted d-none mb-3"></p>
          <div id="campsiteDetailsMap" class="map-container" aria-label="Карта с локация на къмпинга"></div>
        </section>

        <section class="details-section-card p-4">
          <div class="d-flex align-items-center gap-2 mb-3">
            <span class="icon-badge"><i class="bi bi-chat-left-text"></i></span>
            <h3 class="h5 mb-0">Отзиви</h3>
          </div>

          <div id="reviewsAuthMessage" class="alert alert-secondary d-none mb-3"></div>
          <div id="reviewFeedback" class="alert d-none mb-3" role="alert"></div>

          <form id="reviewForm" class="d-none mb-4" novalidate>
            <div class="mb-3">
              <label for="reviewRating" class="form-label">Оценка</label>
              <select id="reviewRating" class="form-select" required>
                <option value="">Изберете оценка</option>
                <option value="5">5 - Отлично</option>
                <option value="4">4 - Много добро</option>
                <option value="3">3 - Добро</option>
                <option value="2">2 - Слабо</option>
                <option value="1">1 - Лошо</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="reviewComment" class="form-label">Коментар</label>
              <textarea
                id="reviewComment"
                class="form-control"
                rows="4"
                maxlength="1000"
                placeholder="Споделете впечатленията си от този къмпинг"
              ></textarea>
            </div>

            <button id="reviewSubmitButton" type="submit" class="btn btn-success">
              Изпрати отзив
            </button>
          </form>

          <div id="reviewsEmpty" class="catalog-empty-state d-none" role="status"></div>
          <div id="reviewsList" class="d-grid gap-3"></div>
        </section>
      </section>
    </main>
    <script type="module" src="/src/pages/campsite-details.page.js"></script>
  </body>
</html>
